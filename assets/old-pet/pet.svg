<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-labelledby="title desc">
  <title id="title">CodePet 桌宠</title>
  <desc id="desc">一个白紫色外壳、黑色面屏、青绿色眼睛的小机器人桌宠。</desc>
  <defs>
    <radialGradient id="shellLight" cx="34%" cy="22%" r="76%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#f2efff"/>
      <stop offset="100%" stop-color="#cfc2f2"/>
    </radialGradient>
    <linearGradient id="screenGlow" x1="36" y1="48" x2="172" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18223f"/>
      <stop offset="100%" stop-color="#060b1d"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b82ff"/>
      <stop offset="100%" stop-color="#5d46b9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="7" flood-color="#22184d" flood-opacity="0.23"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <ellipse cx="130" cy="231" rx="82" ry="13" fill="#241c48" opacity="0.16"/>

    <!-- 小卷毛天线 -->
    <path d="M129 41c-4-13 5-24 17-22 11 2 16 14 8 22-7 7-18 3-15-5 2-6 9-4 10 0" fill="none" stroke="#5f4ca5" stroke-width="5" stroke-linecap="round"/>
    <path d="M129 41c-4-13 5-24 17-22 11 2 16 14 8 22-7 7-18 3-15-5 2-6 9-4 10 0" fill="none" stroke="#c8b8ff" stroke-width="2" stroke-linecap="round"/>

    <!-- 紫色后背和小脚 -->
    <path d="M195 123c26 12 34 48 18 76-7 12-20 19-35 14 11-24 12-55 17-90Z" fill="#8671d8"/>
    <path d="M65 123c-26 12-34 48-18 76 7 12 20 19 35 14-11-24-12-55-17-90Z" fill="#8671d8"/>
    <ellipse cx="71" cy="221" rx="22" ry="14" fill="#17203d"/>
    <ellipse cx="189" cy="221" rx="22" ry="14" fill="#17203d"/>

    <!-- 身体外壳 -->
    <path d="M50 132c0-58 34-92 80-92s80 34 80 92c0 58-27 92-80 92s-80-34-80-92Z" fill="url(#shellLight)" stroke="#34295e" stroke-width="4"/>
    <path d="M72 190c10 26 33 40 58 40s48-14 58-40c-9 36-31 55-58 55s-49-19-58-55Z" fill="#d8cff8" opacity="0.75"/>

    <!-- 手臂 -->
    <path d="M55 148c-22 13-31 34-22 50 9 15 30 9 40-13 7-16 4-31-18-37Z" fill="url(#shellLight)" stroke="#34295e" stroke-width="4"/>
    <path d="M205 148c22 13 31 34 22 50-9 15-30 9-40-13-7-16-4-31 18-37Z" fill="url(#shellLight)" stroke="#34295e" stroke-width="4"/>
    <circle cx="46" cy="190" r="12" fill="#17203d"/>
    <circle cx="214" cy="190" r="12" fill="#17203d"/>

    <!-- 面屏 -->
    <path d="M73 97c5-30 27-47 57-47s52 17 57 47c6 38-14 61-57 61s-63-23-57-61Z" fill="url(#screenGlow)" stroke="#1d1835" stroke-width="4"/>
    <path d="M86 82c12-18 28-26 49-25" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.14" stroke-linecap="round"/>

    <!-- 眼睛和表情 -->
    <ellipse cx="100" cy="120" rx="11" ry="18" fill="#67f0dc"/>
    <ellipse cx="160" cy="120" rx="11" ry="18" fill="#67f0dc"/>
    <ellipse cx="96" cy="114" rx="4" ry="6" fill="#d7fff8" opacity="0.72"/>
    <ellipse cx="156" cy="114" rx="4" ry="6" fill="#d7fff8" opacity="0.72"/>
    <path d="M119 142c4 4 8 6 11 6s7-2 11-6" fill="none" stroke="#67f0dc" stroke-width="4" stroke-linecap="round"/>
    <path d="M114 78l-10 8 10 8M146 78l10 8-10 8" fill="none" stroke="#67f0dc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 胸牌 -->
    <rect x="102" y="166" width="56" height="36" rx="14" fill="url(#purple)" stroke="#34295e" stroke-width="3"/>
    <path d="M122 177l-8 7 8 7M138 177l8 7-8 7" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="130" cy="194" r="2.8" fill="#d9cffd"/>

    <!-- 外壳高光 -->
    <path d="M62 127c3-47 27-75 67-80" fill="none" stroke="#ffffff" stroke-width="7" opacity="0.46" stroke-linecap="round"/>
    <circle cx="83" cy="201" r="7" fill="#ffffff" opacity="0.35"/>
    <circle cx="178" cy="200" r="8" fill="#ffffff" opacity="0.28"/>
  </g>
</svg>
